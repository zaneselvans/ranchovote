# MD013: line length. Disabled — mdformat is configured with wrap="no" so paragraphs
# are single long lines, soft-wrapped in the editor. Hard line-length limits would
# conflict with that approach and create churn in diffs.
MD013: false

# MD024: allow headings with the same content as long as they have different parents.
# Needed in structured reference documents (e.g. FERC accounts) where "Operation"
# and "Maintenance" repeat as sub-headings within many peer sections.
MD024:
  siblings_only: true

# MD010: no-hard-tabs. shfmt uses tabs to indent shell continuation lines (after \),
# which is correct shell style. Disable the check inside code blocks so shfmt's
# formatting survives markdownlint's pass.
MD010:
  code_blocks: false

# MD060/table-column-style: generated tables use consistent pipes but may have
# varying column widths; disable to avoid spurious alignment warnings.
MD060: false

# MD040: fenced code blocks should have a language specified for syntax highlighting.
MD040: false

# MD033: allow raw HTML <script> tags in markdown files, which are used for embedding
# interactive content (e.g. Vega-Lite charts) that can't be easily represented in pure markdown.
MD033:
  allowed_elements:
    - script

# MD007: unordered list indentation. mdformat normalizes nested list items to 4-space
# indentation (Python-Markdown / MkDocs convention), so markdownlint must match.
MD007:
  indent: 4

# MD046: code block style. Disabled because Zensical content tabs (=== "Tab") require
# their content to be indented 4 spaces, which CommonMark also uses to denote indented
# code blocks. Markdownlint cannot distinguish the two, so no consistent style setting
# can satisfy both the tab syntax and the rule.
MD046: false
